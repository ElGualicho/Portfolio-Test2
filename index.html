<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Théâtre japonais</title>

  <link rel="preload" href="assets/paper-texture.png" as="image">
  <link rel="preload" href="assets/sun.png" as="image">
  <link rel="preload" href="assets/clouds-left.png" as="image">
  <link rel="preload" href="assets/clouds-right.png" as="image">
  <link rel="preload" href="assets/grass.png" as="image">
  <link rel="preload" href="assets/pagoda.png" as="image">
  <link rel="preload" href="assets/crane.png" as="image">
  <link rel="preload" href="assets/leaf-1.png" as="image">
  <link rel="preload" href="assets/leaf-2.png" as="image">
  <link rel="preload" href="assets/leaf-3.png" as="image">
  <link rel="preload" href="assets/leaf-4.png" as="image">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #ead8af;
      scroll-behavior: auto;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #ead8af;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .scroll-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-image: url('assets/paper-texture.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      isolation: isolate;
    }

    .scroll-scene::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        radial-gradient(ellipse 78% 70% at 50% 42%, transparent 56%, rgba(40, 18, 4, 0.12) 100%),
        linear-gradient(to bottom, rgba(255, 246, 220, 0.18), transparent 26%, transparent 74%, rgba(71, 34, 8, 0.14));
      mix-blend-mode: multiply;
    }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      will-change: transform, opacity, clip-path;
    }

    .layer img,
    .leaf {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform, opacity, clip-path;
    }

    #sun-layer { z-index: 10; }
    #clouds-left-layer,
    #clouds-right-layer { z-index: 20; }
    #pagoda-layer { z-index: 40; }
    #crane-layer { z-index: 50; }
    #grass-layer { z-index: 70; }
    #leaves-layer { z-index: 90; }

    #sun {
      width: clamp(125px, 14vw, 210px);
      left: 50%;
      top: 12vh;
      transform: translateX(-50%);
    }

    #clouds-left {
      width: clamp(190px, 25vw, 360px);
      left: 23vw;
      top: 30vh;
    }

    #clouds-right {
      width: clamp(190px, 25vw, 360px);
      right: 22vw;
      top: 31vh;
    }

    #grass {
      width: min(1100px, 100vw);
      left: 50%;
      bottom: -1vh;
      transform: translateX(-50%);
    }

    #pagoda {
      width: clamp(170px, 21vw, 330px);
      left: 50%;
      bottom: 4vh;
      transform: translateX(-50%);
    }

    #crane {
      width: clamp(92px, 13vw, 185px);
      left: 31vw;
      top: 55vh;
    }

    .leaf {
      width: clamp(28px, 4.4vw, 58px);
      opacity: 0;
    }

    #leaf-1 { left: 41vw; bottom: 5vh; }
    #leaf-2 { left: 48vw; bottom: 2vh; width: clamp(22px, 3.6vw, 46px); }
    #leaf-3 { left: 55vw; bottom: 7vh; width: clamp(26px, 4vw, 52px); }
    #leaf-4 { left: 61vw; bottom: 3vh; width: clamp(20px, 3.2vw, 42px); }

    .scroll-cue {
      position: fixed;
      left: 50%;
      bottom: 7vh;
      z-index: 200;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: rgba(20, 12, 4, 0.7);
      font-size: clamp(0.72rem, 1.1vw, 0.9rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      pointer-events: none;
      will-change: opacity, transform;
    }

    .scroll-arrow {
      width: 18px;
      height: 18px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      animation: arrow-bounce 1.45s ease-in-out infinite;
    }

    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0) rotate(45deg); opacity: 0.35; }
      50% { transform: translateY(8px) rotate(45deg); opacity: 0.95; }
    }

    @media (max-width: 768px) {
      #sun { top: 13vh; }
      #clouds-left { left: 5vw; top: 30vh; }
      #clouds-right { right: 4vw; top: 32vh; }
      #pagoda { width: clamp(150px, 38vw, 230px); bottom: 5vh; }
      #crane { left: 18vw; top: 56vh; }
      #grass { width: 135vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      .scroll-arrow { animation: none; }
    }
  </style>
</head>
<body>
  <main id="theatre">
    <section class="scroll-scene" aria-label="Composition théâtrale japonaise animée au scroll">
      <div class="layer" id="sun-layer" aria-hidden="true">
        <img id="sun" src="assets/sun.png" alt="">
      </div>

      <div class="layer" id="clouds-left-layer" aria-hidden="true">
        <img id="clouds-left" src="assets/clouds-left.png" alt="">
      </div>

      <div class="layer" id="clouds-right-layer" aria-hidden="true">
        <img id="clouds-right" src="assets/clouds-right.png" alt="">
      </div>

      <div class="layer" id="grass-layer" aria-hidden="true">
        <img id="grass" src="assets/grass.png" alt="">
      </div>

      <div class="layer" id="pagoda-layer" aria-hidden="true">
        <img id="pagoda" src="assets/pagoda.png" alt="">
      </div>

      <div class="layer" id="crane-layer" aria-hidden="true">
        <img id="crane" src="assets/crane.png" alt="">
      </div>

      <div class="layer" id="leaves-layer" aria-hidden="true">
        <img class="leaf" id="leaf-1" src="assets/leaf-1.png" alt="">
        <img class="leaf" id="leaf-2" src="assets/leaf-2.png" alt="">
        <img class="leaf" id="leaf-3" src="assets/leaf-3.png" alt="">
        <img class="leaf" id="leaf-4" src="assets/leaf-4.png" alt="">
      </div>
    </section>

    <div class="scroll-cue" id="scroll-cue" aria-hidden="true">
      <span>scroll</span>
      <span class="scroll-arrow"></span>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger)

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches
    const isMobile = window.matchMedia('(max-width: 768px)').matches
    const scrollCue = document.querySelector('#scroll-cue')

    let wheelCount = 0
    const hideScrollCue = () => {
      gsap.to(scrollCue, {
        opacity: 0,
        y: 18,
        duration: 0.45,
        ease: 'power2.out',
        pointerEvents: 'none'
      })
    }

    window.addEventListener('wheel', () => {
      wheelCount += 1
      if (wheelCount >= 2) hideScrollCue()
    }, { passive: true })

    window.addEventListener('touchmove', hideScrollCue, { passive: true })

    if (prefersReducedMotion) {
      gsap.set(['#sun-layer', '#clouds-left-layer', '#clouds-right-layer', '#grass-layer', '#crane-layer'], { opacity: 1, x: 0, y: 0 })
      gsap.set('#pagoda-layer', { opacity: 1, clipPath: 'inset(0% 0% 0% 0%)' })
      gsap.set('.leaf', { opacity: 1, y: 0, rotation: 0 })
      gsap.set(scrollCue, { opacity: 0 })
    } else {
      gsap.set('#sun-layer', { opacity: 0, y: '105vh' })
      gsap.set('#clouds-left-layer', { opacity: 0, x: '-65vw' })
      gsap.set('#clouds-right-layer', { opacity: 0, x: '65vw' })
      gsap.set('#grass-layer', { opacity: 0, y: '105vh' })
      gsap.set('#pagoda-layer', { opacity: 1, clipPath: 'inset(100% 0% 0% 0%)' })
      gsap.set('#crane-layer', { opacity: 0, x: '-70vw' })
      gsap.set('.leaf', { opacity: 0, y: '35vh', rotation: -18 })

      const tl = gsap.timeline({
        defaults: { ease: 'power2.out' },
        scrollTrigger: {
          trigger: '.scroll-scene',
          start: 'top top',
          end: '+=620%',
          pin: true,
          pinSpacing: true,
          scrub: 1.15,
          anticipatePin: 1
        }
      })

      tl.to(scrollCue, { opacity: 0, y: 18, duration: 0.25, ease: 'power1.out' }, 0.08)

      tl.to('#sun-layer', {
        opacity: 1,
        y: isMobile ? '-3vh' : '-7vh',
        duration: 1.15
      }, 0.15)

      tl.to('#clouds-left-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 1.25)

      tl.to('#clouds-right-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 1.45)

      tl.to('#sun-layer', {
        y: isMobile ? '-5vh' : '-10vh',
        duration: 1.1,
        ease: 'none'
      }, 1.25)

      tl.to('#grass-layer', {
        opacity: 1,
        y: 0,
        duration: 1.1
      }, 2.55)

      tl.to('#pagoda-layer', {
        clipPath: 'inset(0% 0% 0% 0%)',
        duration: 1.25,
        ease: 'power2.inOut'
      }, 3.65)

      tl.to('#crane-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 4.9)

      tl.to('#crane-layer', {
        x: isMobile ? '7vw' : '10vw',
        y: isMobile ? '-4vh' : '-6vh',
        duration: 1.4,
        ease: 'none'
      }, 5.8)

      tl.to('#leaf-1', {
        opacity: 1,
        y: '-58vh',
        x: '-7vw',
        rotation: 36,
        duration: 1.2,
        ease: 'sine.out'
      }, 6.05)

      tl.to('#leaf-2', {
        opacity: 1,
        y: '-67vh',
        x: '4vw',
        rotation: -32,
        duration: 1.25,
        ease: 'sine.out'
      }, 6.35)

      tl.to('#leaf-3', {
        opacity: 1,
        y: '-60vh',
        x: '9vw',
        rotation: 42,
        duration: 1.25,
        ease: 'sine.out'
      }, 6.65)

      tl.to('#leaf-4', {
        opacity: 1,
        y: '-72vh',
        x: '-2vw',
        rotation: -48,
        duration: 1.3,
        ease: 'sine.out'
      }, 6.95)

      tl.to({}, { duration: 0.7 })

      ScrollTrigger.create({
        trigger: '.scroll-scene',
        start: 'top top',
        end: '+=620%',
        onLeave: () => {
          gsap.to('#clouds-left', { x: -10, duration: 6, yoyo: true, repeat: -1, ease: 'sine.inOut' })
          gsap.to('#clouds-right', { x: 10, duration: 7, yoyo: true, repeat: -1, ease: 'sine.inOut' })
          gsap.to('#crane', { y: -8, duration: 4.5, yoyo: true, repeat: -1, ease: 'sine.inOut' })
        }
      })
    }
  </script>
</body>
</html>
