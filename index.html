<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Théâtre japonais</title>

  <link rel="preload" href="assets/paper-texture.png" as="image">
  <link rel="preload" href="assets/sun.png" as="image">
  <link rel="preload" href="assets/clouds-left.png" as="image">
  <link rel="preload" href="assets/clouds-right.png" as="image">
  <link rel="preload" href="assets/grass.png" as="image">
  <link rel="preload" href="assets/pagoda.png" as="image">
  <link rel="preload" href="assets/crane.png" as="image">
  <link rel="preload" href="assets/leaf-1.png" as="image">
  <link rel="preload" href="assets/leaf-2.png" as="image">
  <link rel="preload" href="assets/leaf-3.png" as="image">
  <link rel="preload" href="assets/leaf-4.png" as="image">
  <link rel="preload" href="assets/pagoda-fight.png" as="image">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #ead8af;
      scroll-behavior: auto;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #ead8af;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .scroll-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-image: url('assets/paper-texture.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      isolation: isolate;
    }

    .scroll-scene::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        radial-gradient(ellipse 78% 70% at 50% 42%, transparent 58%, rgba(40, 18, 4, 0.10) 100%),
        linear-gradient(to bottom, rgba(255, 246, 220, 0.12), transparent 26%, transparent 74%, rgba(71, 34, 8, 0.10));
      mix-blend-mode: multiply;
    }

    .composition {
      position: absolute;
      left: 50%;
      top: 54%;
      width: max(120vw, 170vh);
      aspect-ratio: 16 / 9;
      transform: translate(-50%, -50%);
      overflow: visible;
      z-index: 1;
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      will-change: transform, opacity, clip-path;
    }

    .layer img,
    .leaf {
      position: absolute;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      will-change: transform, opacity, clip-path;
    }

    #sun-layer { z-index: 10; }
    #clouds-left-layer,
    #clouds-right-layer { z-index: 20; }
    #pagoda-layer { z-index: 45; }
    #crane-layer { z-index: 55; }
    #grass-layer { z-index: 70; }
    #leaves-layer { z-index: 90; }
    #balcony-layer { z-index: 120; }

    #sun {
      width: 30%;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
    }

    #clouds-left {
      width: 28%;
      left: 10%;
      top: 21%;
    }

    #clouds-right {
      width: 29%;
      right: 10%;
      top: 9%;
    }

    #grass {
      width: 83%;
      left: 50%;
      bottom: 17%;
      transform: translateX(-50%);
    }

    #pagoda {
      width: 33%;
      left: 50%;
      bottom: 17%;
      transform: translateX(-50%);
      transform-origin: bottom center;
    }

    #pagoda-balcony {
      width: 112%;
      left: 50%;
      bottom: -6%;
      transform: translateX(-50%);
      transform-origin: center center;
    }

    #crane {
      width: 17%;
      left: 19%;
      top: 41%;
    }

    .leaf {
      width: 4.5%;
      opacity: 0;
    }

    #leaf-1 { left: 0%; bottom: 25%; width: 100%; }
    #leaf-2 { left: 0%; bottom: 0%; width: 100%; }
    #leaf-3 { left: 0%; bottom: 2%; width: 100%; }
    #leaf-4 { left: 0%; bottom: -3%; width: 100%; }

    .scroll-cue {
      position: fixed;
      left: 50%;
      bottom: 7vh;
      z-index: 200;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: rgba(20, 12, 4, 0.7);
      font-size: clamp(0.72rem, 1.1vw, 0.9rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      pointer-events: none;
      will-change: opacity, transform;
    }

    .scroll-arrow {
      width: 18px;
      height: 18px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      animation: arrow-bounce 1.45s ease-in-out infinite;
    }

    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0) rotate(45deg); opacity: 0.35; }
      50% { transform: translateY(8px) rotate(45deg); opacity: 0.95; }
    }

    @media (max-width: 768px) {
      .composition {
        width: max(190vw, 135vh);
        top: 51%;
      }

      #sun { width: 28%; top: 4%; }
      #clouds-left { width: 33%; left: -1%; top: 22%; }
      #clouds-right { width: 33%; right: -2%; top: 30%; }
      #grass { width: 108%; bottom: -8%; }
      #pagoda { width: 34%; bottom: -13%; }
      #crane { width: 24%; left: 10%; top: 42%; }
      #pagoda-balcony { width: 142%; bottom: -5%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .scroll-arrow { animation: none; }
    }
  </style>
</head>
<body>
  <main id="theatre">
    <section class="scroll-scene" aria-label="Composition théâtrale japonaise animée au scroll">
      <div class="composition" aria-hidden="true">
        <div class="layer" id="sun-layer">
          <img id="sun" src="assets/sun.png" alt="">
        </div>

        <div class="layer" id="clouds-left-layer">
          <img id="clouds-left" src="assets/clouds-left.png" alt="">
        </div>

        <div class="layer" id="clouds-right-layer">
          <img id="clouds-right" src="assets/clouds-right.png" alt="">
        </div>

        <div class="layer" id="grass-layer">
          <img id="grass" src="assets/grass.png" alt="">
        </div>

        <div class="layer" id="pagoda-layer">
          <img id="pagoda" src="assets/pagoda.png" alt="">
        </div>

        <div class="layer" id="crane-layer">
          <img id="crane" src="assets/crane.png" alt="">
        </div>

        <div class="layer" id="leaves-layer">
          <img class="leaf" id="leaf-1" src="assets/leaf-1.png" alt="">
          <img class="leaf" id="leaf-2" src="assets/leaf-2.png" alt="">
          <img class="leaf" id="leaf-3" src="assets/leaf-3.png" alt="">
          <img class="leaf" id="leaf-4" src="assets/leaf-4.png" alt="">
        </div>

        <div class="layer" id="balcony-layer">
          <img id="pagoda-balcony" src="assets/pagoda-fight.png" alt="">
        </div>
      </div>
    </section>

    <div class="scroll-cue" id="scroll-cue" aria-hidden="true">
      <span>scroll</span>
      <span class="scroll-arrow"></span>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger)

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches
    const isMobile = window.matchMedia('(max-width: 768px)').matches
    const scrollCue = document.querySelector('#scroll-cue')

    let wheelCount = 0
    const hideScrollCue = () => {
      gsap.to(scrollCue, {
        opacity: 0,
        y: 18,
        duration: 0.45,
        ease: 'power2.out',
        pointerEvents: 'none'
      })
    }

    window.addEventListener('wheel', () => {
      wheelCount += 1
      if (wheelCount >= 2) hideScrollCue()
    }, { passive: true })

    window.addEventListener('touchmove', hideScrollCue, { passive: true })

    if (prefersReducedMotion) {
      gsap.set(['#sun-layer', '#clouds-left-layer', '#clouds-right-layer', '#grass-layer', '#crane-layer'], { opacity: 1, x: 0, y: 0 })
      gsap.set('#balcony-layer', { opacity: 1, scale: 1, y: 0 })
      gsap.set('#pagoda-layer', { opacity: 1, clipPath: 'inset(0% 0% 0% 0%)' })
      gsap.set('.leaf', { opacity: 1, y: 0, rotation: 0 })
      gsap.set(scrollCue, { opacity: 0 })
    } else {
      gsap.set('#sun-layer', { opacity: 0, y: '105vh' })
      gsap.set('#clouds-left-layer', { opacity: 0, x: '-80vw' })
      gsap.set('#clouds-right-layer', { opacity: 0, x: '80vw' })
      gsap.set('#grass-layer', { opacity: 0, y: '105vh' })
      gsap.set('#pagoda', {
        autoAlpha: 0,
        xPercent: -50,
        yPercent: 65,
        rotationX: -35,
        z: -20,
        transformOrigin: 'bottom center',
        transformPerspective: 1200,
        force3D: true
      })
      gsap.set('#crane-layer', { opacity: 0, x: '-80vw' })
      gsap.set('.leaf', { opacity: 0, y: '45vh', rotation: -18 })
      gsap.set('#balcony-layer', { opacity: 0, y: '8vh', scale: 1.08 })

      const tl = gsap.timeline({
        defaults: { ease: 'power2.out' },
        scrollTrigger: {
          trigger: '.scroll-scene',
          start: 'top top',
          end: '+=780%',
          pin: true,
          pinSpacing: true,
          scrub: 1.15,
          anticipatePin: 1
        }
      })

      tl.to(scrollCue, { opacity: 0, y: 18, duration: 0.25, ease: 'power1.out' }, 0.08)

      tl.to('#sun-layer', {
        opacity: 1,
        y: isMobile ? '-4vh' : '-7vh',
        duration: 1.15
      }, 0.15)

      tl.to('#clouds-left-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 1.25)

      tl.to('#clouds-right-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 1.45)

      tl.to('#sun-layer', {
        y: isMobile ? '-5vh' : '-8vh',
        duration: 1.1,
        ease: 'none'
      }, 1.25)

      tl.to('#grass-layer', {
        opacity: 1,
        y: 0,
        duration: 1.1
      }, 2.55)

      tl.set('#pagoda', { autoAlpha: 1 }, 3.65)

      tl.to('#pagoda', {
        yPercent: 0,
        rotationX: 0,
        z: 0,
        duration: 1.25,
        ease: 'power2.out'
      }, 3.65)

      tl.to('#crane-layer', {
        opacity: 1,
        x: 0,
        duration: 1.05
      }, 4.9)

      tl.to('#crane-layer', {
        x: isMobile ? '6vw' : '8vw',
        y: isMobile ? '-3vh' : '-5vh',
        duration: 1.4,
        ease: 'none'
      }, 5.8)

      tl.to('#leaf-1', {
        opacity: 1,
        y: '-26vh',
        x: '-4vw',
        rotation: 36,
        duration: 1.2,
        ease: 'sine.out'
      }, 6.05)

      tl.to('#leaf-2', {
        opacity: 1,
        y: '-100vh',
        x: '3vw',
        rotation: -32,
        duration: 1.25,
        ease: 'sine.out'
      }, 6.35)

      tl.to('#leaf-3', {
        opacity: 1,
        y: '-100vh',
        x: '5vw',
        rotation: 42,
        duration: 1.25,
        ease: 'sine.out'
      }, 6.65)

      tl.to('#leaf-4', {
        opacity: 1,
        y: '-100vh',
        x: '-2vw',
        rotation: -48,
        duration: 1.3,
        ease: 'sine.out'
      }, 6.95)

      tl.to('.composition', {
        scale: 1.55,
        y: '12vh',
        duration: 1.7,
        ease: 'power2.inOut'
      }, 7.25)

      tl.to('#pagoda', {
        autoAlpha: 0,
        duration: 1.0,
        ease: 'power2.inOut'
      }, 7.55)

      tl.to('#sun-layer, #clouds-left-layer, #clouds-right-layer, #grass-layer, #crane-layer, #leaves-layer', {
        opacity: 0,
        duration: 1.1,
        ease: 'power2.inOut'
      }, 7.7)

      tl.to('#balcony-layer', {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 1.45,
        ease: 'power2.out'
      }, 7.95)

      tl.to({}, { duration: 0.9 })

      ScrollTrigger.create({
        trigger: '.scroll-scene',
        start: 'top top',
        end: '+=780%',
        onLeave: () => {
          gsap.to('#clouds-left', { x: -10, duration: 6, yoyo: true, repeat: -1, ease: 'sine.inOut' })
          gsap.to('#clouds-right', { x: 10, duration: 7, yoyo: true, repeat: -1, ease: 'sine.inOut' })
          gsap.to('#crane', { y: -8, duration: 4.5, yoyo: true, repeat: -1, ease: 'sine.inOut' })
        }
      })
    }
  </script>
</body>
</html>
